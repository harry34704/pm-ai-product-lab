name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mockroom_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d mockroom_ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/mockroom_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/mockroom_ci?schema=public
      NEXTAUTH_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
      NEXTAUTH_URL: http://127.0.0.1:3000
      APP_BASE_URL: http://127.0.0.1:3000
      APP_ENCRYPTION_KEY: ci-secret-ci-secret-ci-secret-ci-secret
      AI_PROVIDER_PRIORITY: mock
      TRANSCRIPTION_PROVIDER: browser
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Prisma migrations
        run: pnpm prisma:migrate
      - name: Seed database
        run: pnpm prisma:seed
      - name: Run lint
        run: pnpm lint
      - name: Run tests
        run: pnpm test
      - name: Build applications
        run: pnpm build
