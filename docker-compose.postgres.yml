services:
  postgres:
    image: postgres:16-alpine
    container_name: mockroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mockroom_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mockroom_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mockroom_ai"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mockroom_postgres_data:
