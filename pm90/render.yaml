databases:
  - name: pm90-postgres
    databaseName: pm90
    user: pm90

services:
  - type: web
    name: pm90-api
    runtime: python
    rootDir: pm90/backend
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pm90-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: fallback
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OLLAMA_BASE_URL
        value: http://host.docker.internal:11434
      - key: OLLAMA_MODEL
        value: llama3.2
      - key: CORS_ORIGINS
        sync: false
      - key: DEMO_USER_EMAIL
        value: demo@pm90.app
      - key: DEMO_USER_PASSWORD
        value: Demo123!
