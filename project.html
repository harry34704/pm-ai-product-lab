<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting | Harry Munyai</title>
    <meta http-equiv="refresh" content="0; url=projects.html" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="stylesheet" href="style.css" />
    <script>
      const slug = new URLSearchParams(window.location.search).get("slug");
      const target = slug ? `projects.html#${slug}` : "projects.html";
      window.location.replace(target);
    </script>
  </head>
  <body class="redirect-body">
    <main class="not-found-main">
      <section class="not-found-card">
        <p class="eyebrow">Redirecting</p>
        <h1>Taking you to the project showcase.</h1>
        <p>If the redirect does not complete automatically, use the link below.</p>
        <a class="button primary" href="projects.html">Open Projects</a>
      </section>
    </main>
  </body>
</html>
